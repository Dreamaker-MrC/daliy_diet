name: Deploy to GitHub Pages

# NOTE: This Actions-based deploy is disabled for auto-run because the account's
# billed Actions minutes are currently locked (custom Actions fail with a billing
# error). Deployment is done via the gh-pages branch + GitHub's free built-in
# builder instead. Re-enable the `push` trigger once the billing lock is cleared.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Enable GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Install, build, and upload
        uses: withastro/action@v4

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
